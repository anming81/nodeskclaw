version: "3.8"
services:
  backend:
    build:
      context: ./claw-buddy-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./claw-buddy-backend:/app
    env_file:
      - ./claw-buddy-backend/.env
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
